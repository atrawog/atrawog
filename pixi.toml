[project]
authors = ["Andreas Trawoeger <atrawog@gmail.com>"]
channels = ["conda-forge"]
description = "Add a short description here"
name = "atrawog"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
jupyterlab = "python -m jupyter lab"

[dependencies]
python = "3.12.*"
pip = ">=24.3.1,<25"
jupyter = ">=1.1.1,<2"
jupyter_server = ">=2.14.2,<3"
pillow = ">=11.0.0,<12"
piexif = ">=1.1.3,<2"
mutagen = ">=1.47.0,<2"
pymediainfo = ">=6.1.0,<7"
jupyter-ai = ">=2.28.3,<3"
jupyter-cache = ">=1.0.1,<2"
mystmd = ">=1.3.18,<2"
nodejs = ">=22.11.0,<22.12"
jupyterlab-myst = ">=2.4.2,<2.5"
altair = ">=5.5.0,<5.6"
matplotlib = ">=3.9.3,<3.10"
numpy = ">=1.26.4,<1.27"
pandas = ">=2.2.3,<2.3"
geopandas = ">=1.0.1,<1.1"
vega_datasets = ">=0.9.0,<0.10"
jupyter-book = ">=1.0.3,<1.1"

[pypi-dependencies]
vllm = ">=0.6.0, <0.7"
mistral = ">=19.0.0, <20"
mistral-common = ">=1.3.4, <2"
torch = ">=2.4.0, <3"
torchvision = ">=0.19.0, <0.20"
torchaudio = ">=2.4.0, <3"
transformers = ">=4.47.0, <5"
accelerate = ">=1.2.0, <2"
sentencepiece = ">=0.2.0, <0.3"
huggingface-hub = ">=0.26.5, <0.27"
bitsandbytes = ">=0.45.0, <0.46"
